<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carl-superchat — Test Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.min.js"></script>
  <script>if(typeof marked==='undefined'){document.write('<scr'+'ipt src="https://unpkg.com/marked/lib/marked.umd.min.js"><\/scr'+'ipt>')}</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    #status { width: 10px; height: 10px; border-radius: 50%; background: #666; flex-shrink: 0; }
    #status.connected { background: #4caf50; }
    #status-text { font-size: 12px; color: #888; }

    .toolbar { padding: 8px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; }
    .toolbar select, .toolbar label { font-size: 13px; }
    .toolbar select { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; }
    .toolbar label { color: #888; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .toolbar input[type="checkbox"] { accent-color: #4caf50; }
    #tabs-info { margin-left: auto; font-size: 12px; color: #666; }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; white-space: pre-wrap; }
    .msg.ai { align-self: flex-start; background: #262626; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.ai.streaming { border-left: 2px solid #4caf50; }
    .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; font-style: italic; }
    .msg.error { align-self: center; background: #3a1010; color: #f87171; font-size: 13px; }

    .msg.ai p { margin: 0.4em 0; }
    .msg.ai p:first-child { margin-top: 0; }
    .msg.ai p:last-child { margin-bottom: 0; }
    .msg.ai ul, .msg.ai ol { margin: 0.4em 0; padding-left: 1.5em; }
    .msg.ai li { margin: 0.2em 0; }
    .msg.ai code { background: #1a1a1a; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'Consolas', 'Fira Code', monospace; }
    .msg.ai pre { background: #111; border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 0.5em 0; }
    .msg.ai pre code { background: none; padding: 0; font-size: 13px; }
    .msg.ai h1, .msg.ai h2, .msg.ai h3, .msg.ai h4 { margin: 0.6em 0 0.3em; font-weight: 600; }
    .msg.ai h1 { font-size: 1.3em; }
    .msg.ai h2 { font-size: 1.15em; }
    .msg.ai h3 { font-size: 1.05em; }
    .msg.ai blockquote { border-left: 3px solid #444; padding-left: 10px; color: #aaa; margin: 0.4em 0; }
    .msg.ai table { border-collapse: collapse; margin: 0.5em 0; }
    .msg.ai th, .msg.ai td { border: 1px solid #444; padding: 4px 8px; font-size: 13px; }
    .msg.ai th { background: #1a1a1a; }
    .msg.ai a { color: #60a5fa; }
    .msg.ai strong { color: #f0f0f0; }
    .msg.ai hr { border: none; border-top: 1px solid #333; margin: 0.6em 0; }

    #input-area { padding: 12px 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
    #input-area .input-row { flex: 1; min-width: 200px; display: flex; gap: 8px; align-items: flex-end; }
    #input-area textarea { flex: 1; resize: none; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; min-height: 44px; max-height: 120px; }
    #input-area textarea:focus { outline: none; border-color: #4caf50; }
    #input-area button { background: #4caf50; color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
    #input-area button:hover { background: #43a047; }
    #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
    #file-input { display: none; }
    #attach-btn { background: #2a2a2a; color: #888; padding: 0 14px; border: 1px solid #444; }
    #attach-btn:hover { background: #333; color: #e0e0e0; border-color: #555; }
    #files-preview { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; margin-top: 4px; }
    .file-pill { font-size: 12px; color: #888; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 4px 8px; display: flex; align-items: center; gap: 6px; }
    .file-pill .remove { cursor: pointer; color: #888; font-weight: bold; }
    .file-pill .remove:hover { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <div id="status"></div>
    <h1>carl-superchat</h1>
    <span id="status-text">Checking...</span>
  </header>

  <div class="toolbar">
    <select id="site-select">
      <option value="grok">Grok</option>
      <option value="gemini">Gemini</option>
      <option value="qwen">Qwen</option>
    </select>
    <label><input type="checkbox" id="stream-toggle" checked> Streaming</label>
    <span id="tabs-info"></span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx">
    <div class="input-row">
      <textarea id="user-input" placeholder="Введи сообщение или прикрепи файл..." rows="1"></textarea>
      <button type="button" id="attach-btn" title="Прикрепить файл">📎</button>
      <button id="send-btn">Send</button>
    </div>
    <div id="files-preview"></div>
  </div>

  <script>
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
    }

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const siteSelect = document.getElementById('site-select');
    const streamToggle = document.getElementById('stream-toggle');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const tabsInfo = document.getElementById('tabs-info');
    const fileInput = document.getElementById('file-input');
    const attachBtn = document.getElementById('attach-btn');
    const filesPreview = document.getElementById('files-preview');

    let sending = false;
    let pendingFiles = [];

    function renderMarkdown(el, text) {
      if (typeof marked !== 'undefined' && marked.parse) {
        el.innerHTML = marked.parse(text);
      } else {
        // fallback: basic markdown
        let html = text
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^# (.+)$/gm, '<h1>$1</h1>')
          .replace(/^\- (.+)$/gm, '<li>$1</li>')
          .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
          .replace(/\n/g, '<br>');
        el.innerHTML = html;
      }
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const files = Array.from(fileInput.files || []);
      fileInput.value = '';
      for (const file of files) {
        const data = await readFileAsBase64(file);
        pendingFiles.push({ name: file.name, mime: file.type || 'application/octet-stream', data });
      }
      renderFilesPreview();
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.replace(/^data:[^;]+;base64,/, ''));
        r.onerror = () => reject(new Error('Read failed'));
        r.readAsDataURL(file);
      });
    }

    function renderFilesPreview() {
      filesPreview.innerHTML = '';
      pendingFiles.forEach((f, i) => {
        const pill = document.createElement('span');
        pill.className = 'file-pill';
        pill.innerHTML = `<span>${escapeHtml(f.name)}</span><span class="remove" data-i="${i}" title="Удалить">×</span>`;
        pill.querySelector('.remove').addEventListener('click', () => {
          pendingFiles.splice(i, 1);
          renderFilesPreview();
        });
        filesPreview.appendChild(pill);
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function send() {
      const text = inputEl.value.trim();
      const hasFiles = pendingFiles.length > 0;
      if ((!text && !hasFiles) || sending) return;

      const site = siteSelect.value;
      const stream = streamToggle.checked;

      const userLabel = hasFiles ? (text ? [text, pendingFiles.map(f => f.name).join(', ')].join(' — ') : '📎 ' + pendingFiles.map(f => f.name).join(', ')) : text;
      addMessage(userLabel, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      const filesToSend = pendingFiles.slice();
      pendingFiles = [];
      renderFilesPreview();
      sending = true;
      sendBtn.disabled = true;

      const aiMsg = addMessage('', 'ai');
      if (stream) aiMsg.classList.add('streaming');
      let rawText = '';

      const body = { site, message: text || '', stream };
      if (filesToSend.length) body.files = filesToSend;

      try {
        if (stream) {
          const res = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            const err = await res.text();
            aiMsg.textContent = 'Error: ' + err;
            aiMsg.classList.add('error');
            aiMsg.classList.remove('streaming');
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let finished = false;

          try {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop();

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.chunk) {
                    rawText += data.chunk;
                    renderMarkdown(aiMsg, rawText);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                  } else if (data.done) {
                    rawText = data.fullText;
                    renderMarkdown(aiMsg, rawText);
                    finished = true;
                  } else if (data.error) {
                    aiMsg.textContent = 'Error: ' + data.error;
                    aiMsg.classList.add('error');
                    finished = true;
                  }
                } catch {}
              }
            }
          } catch (readErr) {
            if (!finished && !rawText) {
              aiMsg.textContent = 'Stream error: ' + readErr.message;
              aiMsg.classList.add('error');
            }
          }
          aiMsg.classList.remove('streaming');
        } else {
          body.stream = false;
          const res = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (data.ok) {
            renderMarkdown(aiMsg, data.fullText);
          } else {
            aiMsg.textContent = 'Error: ' + data.error;
            aiMsg.classList.add('error');
          }
        }
      } catch (err) {
        aiMsg.textContent = 'Network error: ' + err.message;
        aiMsg.classList.add('error');
        aiMsg.classList.remove('streaming');
      } finally {
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function addMessage(text, type) {
      const el = document.createElement('div');
      el.className = `msg ${type}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        statusEl.className = data.connected ? 'connected' : '';
        statusText.textContent = data.connected ? 'Extension connected' : 'Extension not connected';
      } catch {
        statusEl.className = '';
        statusText.textContent = 'Server unreachable';
      }
    }

    async function checkTabs() {
      try {
        const res = await fetch('/api/tabs');
        const data = await res.json();
        if (data.tabs && data.tabs.length) {
          tabsInfo.textContent = 'Tabs: ' + data.tabs.map(t => t.site).join(', ');
        } else {
          tabsInfo.textContent = 'No AI tabs open';
        }
      } catch {
        tabsInfo.textContent = '';
      }
    }

    checkStatus();
    checkTabs();
    setInterval(checkStatus, 5000);
    setInterval(checkTabs, 10000);
  </script>
</body>
</html>
