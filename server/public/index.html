<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carl-superchat — Test Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    #status { width: 10px; height: 10px; border-radius: 50%; background: #666; flex-shrink: 0; }
    #status.connected { background: #4caf50; }
    #status-text { font-size: 12px; color: #888; }

    .toolbar { padding: 8px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; }
    .toolbar select, .toolbar label { font-size: 13px; }
    .toolbar select { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; }
    .toolbar label { color: #888; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .toolbar input[type="checkbox"] { accent-color: #4caf50; }
    #tabs-info { margin-left: auto; font-size: 12px; color: #666; }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: #262626; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.ai.streaming { border-left: 2px solid #4caf50; }
    .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; font-style: italic; }
    .msg.error { align-self: center; background: #3a1010; color: #f87171; font-size: 13px; }

    #input-area { padding: 12px 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; gap: 8px; }
    #input-area textarea { flex: 1; resize: none; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; min-height: 44px; max-height: 120px; }
    #input-area textarea:focus { outline: none; border-color: #4caf50; }
    #input-area button { background: #4caf50; color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
    #input-area button:hover { background: #43a047; }
    #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div id="status"></div>
    <h1>carl-superchat</h1>
    <span id="status-text">Checking...</span>
  </header>

  <div class="toolbar">
    <select id="site-select">
      <option value="grok">Grok</option>
      <option value="gemini">Gemini</option>
      <option value="qwen">Qwen</option>
    </select>
    <label><input type="checkbox" id="stream-toggle" checked> Streaming</label>
    <span id="tabs-info"></span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Введи сообщение..." rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const siteSelect = document.getElementById('site-select');
    const streamToggle = document.getElementById('stream-toggle');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const tabsInfo = document.getElementById('tabs-info');

    let sending = false;

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      const site = siteSelect.value;
      const stream = streamToggle.checked;

      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sending = true;
      sendBtn.disabled = true;

      const aiMsg = addMessage('', 'ai');
      if (stream) aiMsg.classList.add('streaming');

      try {
        if (stream) {
          const res = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ site, message: text, stream: true }),
          });

          if (!res.ok) {
            const err = await res.text();
            aiMsg.textContent = 'Error: ' + err;
            aiMsg.classList.add('error');
            aiMsg.classList.remove('streaming');
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let finished = false;

          try {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop();

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.chunk) {
                    aiMsg.textContent += data.chunk;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                  } else if (data.done) {
                    aiMsg.textContent = data.fullText;
                    finished = true;
                  } else if (data.error) {
                    aiMsg.textContent = 'Error: ' + data.error;
                    aiMsg.classList.add('error');
                    finished = true;
                  }
                } catch {}
              }
            }
          } catch (readErr) {
            if (!finished && !aiMsg.textContent) {
              aiMsg.textContent = 'Stream error: ' + readErr.message;
              aiMsg.classList.add('error');
            }
          }
          aiMsg.classList.remove('streaming');
        } else {
          const res = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ site, message: text, stream: false }),
          });
          const data = await res.json();
          if (data.ok) {
            aiMsg.textContent = data.fullText;
          } else {
            aiMsg.textContent = 'Error: ' + data.error;
            aiMsg.classList.add('error');
          }
        }
      } catch (err) {
        aiMsg.textContent = 'Network error: ' + err.message;
        aiMsg.classList.add('error');
        aiMsg.classList.remove('streaming');
      } finally {
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    function addMessage(text, type) {
      const el = document.createElement('div');
      el.className = `msg ${type}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        statusEl.className = data.connected ? 'connected' : '';
        statusText.textContent = data.connected ? 'Extension connected' : 'Extension not connected';
      } catch {
        statusEl.className = '';
        statusText.textContent = 'Server unreachable';
      }
    }

    async function checkTabs() {
      try {
        const res = await fetch('/api/tabs');
        const data = await res.json();
        if (data.tabs && data.tabs.length) {
          tabsInfo.textContent = 'Tabs: ' + data.tabs.map(t => t.site).join(', ');
        } else {
          tabsInfo.textContent = 'No AI tabs open';
        }
      } catch {
        tabsInfo.textContent = '';
      }
    }

    checkStatus();
    checkTabs();
    setInterval(checkStatus, 5000);
    setInterval(checkTabs, 10000);
  </script>
</body>
</html>
